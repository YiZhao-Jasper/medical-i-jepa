data:
  batch_size: 256
  crop_size: 224
  num_workers: 10
  pin_mem: true
  root_path: /root/autodl-tmp/data/nih-chest-xrays-data
  use_zip: false
eval:
  num_classes: 14
  target_labels:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Effusion
  - Emphysema
  - Fibrosis
  - Hernia
  - Infiltration
  - Mass
  - Nodule
  - Pleural_Thickening
  - Pneumonia
  - Pneumothorax
  task: classification
logging:
  folder: /root/autodl-tmp/medical-ijepa/medical-ijepa/logs/linear_probe_ep50/
  write_tag: lp_ep50
meta:
  freeze_encoder: true
  model_name: vit_large
  patch_size: 14
  pretrained_path: /root/autodl-tmp/medical-ijepa/medical-ijepa/logs/pretrain_vitl14/jepa-ep50.pth.tar
  use_bfloat16: true
optimization:
  epochs: 50
  final_lr: 1.0e-06
  lr: 0.001
  start_lr: 0.0001
  warmup: 5
  weight_decay: 0.0
