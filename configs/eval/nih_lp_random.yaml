data:
  batch_size: 256
  crop_size: 224
  num_workers: 10
  pin_mem: true
  root_path: /root/autodl-tmp/data/nih-chest-xrays-data
  use_zip: false

logging:
  folder: /root/autodl-tmp/medical-ijepa/medical-ijepa/logs/linear_probe_random/
  write_tag: lp_random

meta:
  model_name: vit_large
  patch_size: 14
  pretrained_path: null
  freeze_encoder: true
  use_bfloat16: true

eval:
  task: classification
  num_classes: 14
  target_labels:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Effusion
  - Emphysema
  - Fibrosis
  - Hernia
  - Infiltration
  - Mass
  - Nodule
  - Pleural_Thickening
  - Pneumonia
  - Pneumothorax

optimization:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0
  warmup: 5
  final_lr: 1.0e-06
  start_lr: 0.0001
